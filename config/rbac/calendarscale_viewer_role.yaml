# This rule is not used by the project almanac itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to almanac.evoteum.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: almanac
    app.kubernetes.io/managed-by: kustomize
  name: calendarscale-viewer-role
rules:
- apiGroups:
  - almanac.evoteum.com
  resources:
  - calendarscales
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - almanac.evoteum.com
  resources:
  - calendarscales/status
  verbs:
  - get
