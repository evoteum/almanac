# This rule is not used by the project almanac itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the almanac.evoteum.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: almanac
    app.kubernetes.io/managed-by: kustomize
  name: calendarscale-editor-role
rules:
- apiGroups:
  - almanac.evoteum.com
  resources:
  - calendarscales
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - almanac.evoteum.com
  resources:
  - calendarscales/status
  verbs:
  - get
